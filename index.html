<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>绩效测算器及实时排名</title>
  <style>
    :root {
      --bg: #f5efe3;
      --panel: rgba(255,255,255,0.88);
      --panel-strong: rgba(255,255,255,0.96);
      --text: #1e2a2f;
      --muted: #6d7a80;
      --line: rgba(30,42,47,0.12);
      --primary: #0f766e;
      --primary-soft: rgba(15,118,110,0.12);
      --accent: #b45309;
      --shadow: 0 24px 60px rgba(57, 44, 24, 0.12);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(180,83,9,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(15,118,110,0.16), transparent 32%),
        linear-gradient(180deg, #fbf7ef 0%, #f4ecdf 44%, #efe6d8 100%);
      min-height: 100vh;
    }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }
    .hero {
      display: grid;
      gap: 18px;
      padding: 28px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(255,255,255,0.8)),
        linear-gradient(120deg, rgba(15,118,110,0.10), rgba(180,83,9,0.08));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.7);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: 0.02em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 22px;
      position: sticky;
      top: 10px;
      z-index: 30;
      padding: 14px;
      border-radius: 22px;
      background: rgba(251,247,239,0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 34px rgba(57, 44, 24, 0.08);
      border: 1px solid rgba(255,255,255,0.82);
    }
    .field {
      display: grid;
      gap: 8px;
    }
    .field label {
      font-size: 13px;
      color: var(--muted);
    }
    .field input, .field select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(30,42,47,0.12);
      background: rgba(255,255,255,0.96);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .field input:focus, .field select:focus {
      border-color: rgba(15,118,110,0.5);
      box-shadow: 0 0 0 4px rgba(15,118,110,0.12);
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.02fr;
      gap: 20px;
      margin-top: 22px;
      align-items: start;
    }
    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .summary {
      order: 2;
      padding: 24px;
      display: grid;
      gap: 18px;
    }
    .summary-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }
    .headline {
      display: grid;
      gap: 8px;
    }
    .headline h2 {
      margin: 0;
      font-size: 28px;
    }
    .headline p {
      margin: 0;
      color: var(--muted);
    }
    .rank-badge {
      min-width: 210px;
      padding: 18px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(15,118,110,0.95), rgba(12,92,85,0.88));
      color: white;
      display: grid;
      gap: 6px;
    }
    .rank-badge .small {
      opacity: 0.82;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .rank-badge .value {
      font-size: 30px;
      font-weight: 700;
    }
    .rank-trend {
      min-height: 22px;
      font-size: 13px;
      font-weight: 600;
    }
    .rank-trend.up {
      color: #bfdbfe;
    }
    .rank-trend.down {
      color: #fecaca;
    }
    .rank-trend.flat {
      color: rgba(255,255,255,0.82);
    }
    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .score-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(15,118,110,0.08);
      border: 1px solid rgba(15,118,110,0.12);
    }
    .score-item .label {
      color: var(--muted);
      font-size: 13px;
    }
    .score-item .num {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 700;
    }
    .metrics {
      display: grid;
      gap: 12px;
    }
    .metric-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
    }
    .metric-art {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      object-fit: cover;
      background: rgba(245,239,227,0.92);
      border: 1px solid var(--line);
    }
    .metric-body {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .metric-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .metric-title strong {
      font-size: 16px;
    }
    .metric-title span {
      color: var(--accent);
      font-size: 13px;
    }
    .metric-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }
    .metric-values {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-pill {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(245,239,227,0.92);
    }
    .metric-pill .label {
      color: var(--muted);
      font-size: 12px;
    }
    .metric-pill .value {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .side {
      order: 1;
      display: grid;
      gap: 20px;
    }
    .panel {
      padding: 18px;
    }
    .panel h3 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .group-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .group-tab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
    }
    .group-tab.active {
      color: white;
      background: linear-gradient(135deg, rgba(15,118,110,0.96), rgba(19,78,74,0.92));
      border-color: transparent;
    }
    .leaderboard {
      display: grid;
      gap: 10px;
      max-height: 720px;
      overflow: auto;
      padding-right: 2px;
    }
    .leader-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
    }
    .leader-row.highlight {
      background: rgba(15,118,110,0.10);
      border-color: rgba(15,118,110,0.24);
    }
    .rank-chip {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(180,83,9,0.12);
      color: var(--accent);
      font-weight: 700;
    }
    .leader-main {
      min-width: 0;
    }
    .leader-main strong {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .leader-main span {
      color: var(--muted);
      font-size: 12px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .leader-score {
      text-align: right;
    }
    .leader-score strong {
      display: block;
      font-size: 18px;
    }
    .leader-score span {
      color: var(--muted);
      font-size: 12px;
    }
    .trend-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      font-style: normal;
    }
    .trend-up {
      background: rgba(59, 130, 246, 0.14);
      color: #2563eb;
    }
    .trend-down {
      background: rgba(239, 68, 68, 0.14);
      color: #dc2626;
    }
    .trend-flat {
      background: rgba(30, 42, 47, 0.08);
      color: var(--muted);
    }
    .empty {
      padding: 28px 14px;
      color: var(--muted);
      text-align: center;
    }
    .footnote {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .shell {
        padding: 10px 10px 28px;
      }
      .hero {
        padding: 16px;
        border-radius: 22px;
      }
      .summary, .panel {
        padding: 16px;
        border-radius: 20px;
      }
      .hero h1 {
        font-size: 24px;
      }
      .hero p {
        font-size: 14px;
      }
      .hero-meta {
        gap: 8px;
      }
      .tag {
        font-size: 12px;
        padding: 7px 10px;
      }
      .filters {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 14px;
        top: 6px;
        padding: 10px;
        border-radius: 18px;
      }
      .field input, .field select {
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 16px;
      }
      .summary-top {
        gap: 12px;
      }
      .headline h2 {
        font-size: 22px;
      }
      .headline p {
        font-size: 14px;
        line-height: 1.6;
      }
      .rank-badge {
        min-width: unset;
        width: 100%;
        padding: 14px 16px;
      }
      .rank-badge .value {
        font-size: 26px;
      }
      .score-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .score-item {
        padding: 14px;
        border-radius: 16px;
      }
      .score-item .num {
        font-size: 18px;
      }
      .metric-values {
        grid-template-columns: 1fr;
      }
      .metric-row {
        grid-template-columns: 56px 1fr;
        padding: 14px;
        border-radius: 16px;
      }
      .metric-art {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }
      .metric-title strong {
        font-size: 15px;
      }
      .metric-pill .value {
        font-size: 16px;
        line-height: 1.45;
      }
      .group-tabs {
        gap: 6px;
        margin-bottom: 12px;
      }
      .group-tab {
        font-size: 12px;
        padding: 8px 10px;
      }
      .leaderboard {
        max-height: none;
      }
      .leader-row {
        grid-template-columns: auto 1fr;
        gap: 10px;
        padding: 12px;
      }
      .leader-score {
        grid-column: 2;
        text-align: left;
      }
      .leader-score strong {
        font-size: 17px;
      }
      .footnote {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <h1>绩效测算器及实时排名</h1>
        <p>输入姓名与日期，按底表逻辑自动计算五类重点产品的累计/当月达成，并在区域层级、办组层级、区长层级两档中实时定位排名。</p>
      </div>
      <div class="hero-meta">
        <span class="tag">数据主表：陕宁总表2026（确定版到单数据）.xlsx</span>
        <span class="tag">日期来自同目录下的全品类与挤挤装蚝油底表配对</span>
        <span class="tag">页面可直接本地打开</span>
      </div>
      <div class="filters">
        <div class="field">
          <label for="dateSelect">日期</label>
          <select id="dateSelect"></select>
        </div>
        <div class="field">
          <label for="groupSelect">层级</label>
          <select id="groupSelect"></select>
        </div>
        <div class="field">
          <label for="nameInput">姓名</label>
          <input id="nameInput" list="nameList" placeholder="请输入姓名">
          <datalist id="nameList"></datalist>
        </div>
      </div>
    </section>

    <section class="layout">
      <aside class="side">
        <section class="card panel">
          <h3>分组排名</h3>
          <div class="group-tabs" id="groupTabs"></div>
          <div class="leaderboard" id="leaderboard"></div>
        </section>
        <section class="card panel">
          <h3>说明</h3>
          <div class="footnote" id="footnote"></div>
        </section>
      </aside>

      <article class="card summary" id="detailCard">
        <div class="summary-top">
          <div class="headline">
            <h2 id="personName">请选择姓名</h2>
            <p id="personMeta">页面会自动根据岗位识别排名分组，并展示当前日期的重点产品达成。</p>
          </div>
          <div class="rank-badge">
            <div class="small">当前分组排名</div>
            <div class="value" id="rankValue">--</div>
            <div class="rank-trend" id="rankTrend"></div>
            <div id="rankLabel">等待查询</div>
          </div>
        </div>

        <div class="score-grid">
          <div class="score-item">
            <div class="label">综合得分</div>
            <div class="num" id="overallScore">--</div>
          </div>
          <div class="score-item">
            <div class="label">累计得分</div>
            <div class="num" id="cumulativeScore">--</div>
          </div>
          <div class="score-item">
            <div class="label">当月得分</div>
            <div class="num" id="monthlyScore">--</div>
          </div>
          <div class="score-item">
            <div class="label">年目标</div>
            <div class="num" id="annualTarget">--</div>
          </div>
        </div>

        <div class="metrics" id="metrics"></div>
      </article>
    </section>
  </div>

      { id: "cold_mix", label: "凉拌系列", image: "图片/凉拌.jpg", desc: "包含：海天香油、海天芝麻香油、凉拌汁" }
    ];

    const dateSelect = document.getElementById("dateSelect");
    const groupSelect = document.getElementById("groupSelect");
    const nameInput = document.getElementById("nameInput");
    const nameList = document.getElementById("nameList");
    const groupTabs = document.getElementById("groupTabs");
    const leaderboard = document.getElementById("leaderboard");
    const metrics = document.getElementById("metrics");
    const footnote = document.getElementById("footnote");
    const detailCard = document.getElementById("detailCard");

    const personName = document.getElementById("personName");
    const personMeta = document.getElementById("personMeta");
    const rankValue = document.getElementById("rankValue");
    const rankTrend = document.getElementById("rankTrend");
    const rankLabel = document.getElementById("rankLabel");
    const overallScore = document.getElementById("overallScore");
    const cumulativeScore = document.getElementById("cumulativeScore");
    const monthlyScore = document.getElementById("monthlyScore");
    const annualTarget = document.getElementById("annualTarget");

    let activeGroup = DATA.groups[0]?.id || "";
    let lastScrollKey = "";

    function formatNumber(value, digits = 2) {
      const num = Number(value || 0);
      return num.toLocaleString("zh-CN", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function formatPercent(value) {
      return `${formatNumber((Number(value || 0)) * 100, 2)}%`;
    }

    function previousDate(date) {
      const idx = DATA.dates.indexOf(date);
      if (idx <= 0) return "";
      return DATA.dates[idx - 1];
    }

    function findRank(date, groupId, name) {
      const dateData = DATA.dateData[date];
      if (!dateData) return null;
      const item = (dateData.rankings[groupId] || []).find(entry => entry.name === name);
      return item ? item.rank : null;
    }

    function getRankTrendInfo(date, groupId, name, currentRank) {
      const prevDate = previousDate(date);
      if (!prevDate || !currentRank) {
        return { text: "", cls: "trend-flat" };
      }
      const prevRank = findRank(prevDate, groupId, name);
      if (!prevRank) {
        return { text: "新上榜", cls: "trend-flat" };
      }
      const diff = prevRank - currentRank;
      if (diff > 0) {
        return { text: `↑ ${diff}`, cls: "trend-up" };
      }
      if (diff < 0) {
        return { text: `↓ ${Math.abs(diff)}`, cls: "trend-down" };
      }
      return { text: "→ 0", cls: "trend-flat" };
    }

    function renderRankTrend(date, groupId, name, currentRank) {
      rankTrend.className = "rank-trend";
      const info = getRankTrendInfo(date, groupId, name, currentRank);
      if (!info.text) {
        rankTrend.textContent = "";
        return;
      }
      rankTrend.textContent = info.text;
      rankTrend.classList.add(info.cls);
    }

    function populateInputs() {
      DATA.dates.forEach(date => {
        const option = document.createElement("option");
        option.value = date;
        option.textContent = date;
        dateSelect.appendChild(option);
      });
      dateSelect.value = DATA.defaultDate;

      DATA.groups.forEach(group => {
        const option = document.createElement("option");
        option.value = group.id;
        option.textContent = group.label;
        groupSelect.appendChild(option);
      });
      groupSelect.value = activeGroup;

      DATA.names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        nameList.appendChild(option);
      });
      nameInput.value = "";
    }

    function renderGroupTabs(currentGroup) {
      groupSelect.value = currentGroup;
      groupTabs.innerHTML = "";
      DATA.groups.forEach(group => {
        const button = document.createElement("button");
        button.className = `group-tab ${group.id === currentGroup ? "active" : ""}`;
        button.textContent = group.label;
        button.type = "button";
        button.onclick = () => {
          activeGroup = group.id;
          render();
        };
        groupTabs.appendChild(button);
      });
    }

    function renderMetrics(person) {
      metrics.innerHTML = "";
      CATEGORY_META.forEach(meta => {
        const item = person.categories[meta.id];
        const row = document.createElement("div");
        row.className = "metric-row";
        row.innerHTML = `
          <img class="metric-art" src="${meta.image}" alt="${meta.label}">
          <div class="metric-body">
            <div class="metric-title">
              <strong>${meta.label}</strong>
              <span>目标 ${formatNumber(item.target, 2)} 万元</span>
            </div>
            ${meta.desc ? `<div class="metric-desc">${meta.desc}</div>` : ""}
            <div class="metric-values">
              <div class="metric-pill">
                <div class="label">累计达成</div>
                <div class="value">${formatNumber(item.cumulative_value, 2)} 万元 / ${formatPercent(item.cumulative_progress)}</div>
              </div>
              <div class="metric-pill">
                <div class="label">当月达成</div>
                <div class="value">${formatNumber(item.monthly_value, 2)} 万元 / ${formatPercent(item.monthly_progress)}</div>
              </div>
            </div>
          </div>
        `;
        metrics.appendChild(row);
      });
    }

    function renderLeaderboard(dateData, selectedName) {
      const groupData = dateData.rankings[activeGroup] || [];
      leaderboard.innerHTML = "";
      if (!groupData.length) {
        leaderboard.innerHTML = '<div class="empty">当前分组暂无可展示数据。</div>';
        return;
      }
      groupData.forEach(item => {
        const row = document.createElement("div");
        row.className = `leader-row ${item.name === selectedName ? "highlight" : ""}`;
        const trend = getRankTrendInfo(dateSelect.value, activeGroup, item.name, item.rank);
        row.innerHTML = `
          <div class="rank-chip">${item.rank}</div>
          <div class="leader-main">
            <strong>
              <span>${item.name}</span>
              ${trend.text ? `<em class="trend-badge ${trend.cls}">${trend.text}</em>` : ""}
            </strong>
            <span>${item.dept} | ${item.role} | 年目标 ${formatNumber(item.annualTarget, 0)} 万</span>
          </div>
          <div class="leader-score">
            <strong>${formatNumber(item.overallScore, 2)}</strong>
            <span>累计 ${formatNumber(item.cumulativeScore, 2)} / 当月 ${formatNumber(item.monthlyScore, 2)}</span>
          </div>
        `;
        leaderboard.appendChild(row);
      });
    }

    function renderEmpty(message) {
      personName.textContent = "未匹配到人员";
      personMeta.textContent = message;
      rankValue.textContent = "--";
      rankTrend.textContent = "";
      rankTrend.className = "rank-trend";
      rankLabel.textContent = "请检查姓名或日期";
      overallScore.textContent = "--";
      cumulativeScore.textContent = "--";
      monthlyScore.textContent = "--";
      annualTarget.textContent = "--";
      metrics.innerHTML = '<div class="empty">暂无结果。</div>';
    }

    function render() {
      const date = dateSelect.value;
      const selectedName = nameInput.value.trim();
      const dateData = DATA.dateData[date];
      activeGroup = groupSelect.value || activeGroup;
      renderGroupTabs(activeGroup);

      if (!dateData) {
        renderEmpty("当前日期没有找到完整的底表文件配对。");
        leaderboard.innerHTML = '<div class="empty">当前日期没有可展示的排名。</div>';
        footnote.innerHTML = "";
        return;
      }

      const person = dateData.people[selectedName];
      if (!selectedName) {
        personName.textContent = "请输入姓名";
        const activeLabel = DATA.groups.find(group => group.id === activeGroup)?.label || "当前层级";
        personMeta.textContent = `当前仅展示 ${activeLabel} 排名。输入姓名后可查看个人达成与名次。`;
        rankValue.textContent = "--";
        rankTrend.textContent = "";
        rankTrend.className = "rank-trend";
        rankLabel.textContent = activeLabel;
        overallScore.textContent = "--";
        cumulativeScore.textContent = "--";
        monthlyScore.textContent = "--";
        annualTarget.textContent = "--";
        metrics.innerHTML = '<div class="empty">请输入姓名后查看个人重点产品达成详情。</div>';
        renderLeaderboard(dateData, selectedName);
        footnote.innerHTML = `当前日期使用底表：<br>${dateData.files.full}<br>${dateData.files.squeeze}`;
        return;
      }

      if (!person) {
        renderEmpty(`日期 ${date} 下没有找到该姓名，或该人员已被陕西口径过滤。`);
        renderLeaderboard(dateData, selectedName);
        footnote.innerHTML = `当前日期使用底表：<br>${dateData.files.full}<br>${dateData.files.squeeze}`;
        return;
      }

      if (person.groupId) {
        activeGroup = person.groupId;
        groupSelect.value = activeGroup;
        renderGroupTabs(activeGroup);
      }

      const currentRanking = (dateData.rankings[person.groupId] || []).find(item => item.name === person.name);
      personName.textContent = person.name;
      personMeta.textContent = `${person.dept} | ${person.role} | ${person.groupLabel || "未分组"} | 取数方式：${person.metricMode === "by_name" ? "负责人聚合" : "机构映射"}`;
      rankValue.textContent = currentRanking ? `#${currentRanking.rank}` : "--";
      renderRankTrend(date, person.groupId, person.name, currentRanking ? currentRanking.rank : null);
      rankLabel.textContent = person.groupLabel || "未分组";
      overallScore.textContent = formatNumber(person.scores.overall, 2);
      cumulativeScore.textContent = formatNumber(person.scores.cumulative, 2);
      monthlyScore.textContent = formatNumber(person.scores.monthly, 2);
      annualTarget.textContent = `${formatNumber(person.annualTarget, 0)} 万`;
      renderMetrics(person);
      renderLeaderboard(dateData, selectedName);

      const scrollKey = `${date}::${selectedName}`;
      if (lastScrollKey !== scrollKey) {
        lastScrollKey = scrollKey;
        requestAnimationFrame(() => {
          detailCard.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      footnote.innerHTML = `
        当前日期：${date}<br>
        底表文件：${dateData.files.full}<br>
        挤挤装文件：${dateData.files.squeeze}<br>
        排名口径：区域层级=大区经理/区域经理；办组层级=业务经理；区长层级=业务主管并按年目标 1100 万分档。
      `;
    }

    populateInputs();
    dateSelect.addEventListener("change", render);
    groupSelect.addEventListener("change", render);
    nameInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
