<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绩效测算器及实时排名</title>
    <style>
:root {
  --bg: #f5efe4;
  --bg-soft: #fbf8f2;
  --panel: rgba(255, 252, 246, 0.88);
  --line: rgba(125, 91, 47, 0.16);
  --text: #2f2418;
  --muted: #74614d;
  --accent: #9d4d2c;
  --accent-strong: #7b3418;
  --highlight: #f1d7bc;
  --success: #245d4b;
  --shadow: 0 24px 64px rgba(93, 58, 20, 0.12);
  --radius: 24px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
    "Noto Sans SC", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(234, 190, 137, 0.55), transparent 28%),
    radial-gradient(circle at bottom right, rgba(172, 88, 55, 0.18), transparent 32%),
    linear-gradient(180deg, #f8f2e8 0%, #f1eadf 100%);
}

.page-shell {
  width: min(1200px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 28px 0 40px;
}

.hero,
.panel {
  backdrop-filter: blur(14px);
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.hero {
  display: flex;
  justify-content: space-between;
  gap: 24px;
  padding: 28px;
  margin-bottom: 20px;
}

.eyebrow {
  margin: 0 0 10px;
  color: var(--accent);
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.hero h1 {
  margin: 0;
  font-size: clamp(28px, 4vw, 42px);
  line-height: 1.1;
}

.hero-text {
  max-width: 680px;
  margin: 14px 0 0;
  color: var(--muted);
  line-height: 1.7;
}

.hero-meta {
  min-width: 220px;
  align-self: flex-start;
  padding: 18px 20px;
  border-radius: 18px;
  background: linear-gradient(180deg, #fff8ed 0%, #f7e8d6 100%);
  border: 1px solid rgba(157, 77, 44, 0.16);
}

.hero-meta p {
  margin: 0 0 10px;
  color: var(--muted);
}

.hero-meta strong {
  display: block;
  font-size: 24px;
  color: var(--accent-strong);
}

.layout {
  display: grid;
  grid-template-columns: 360px minmax(0, 1fr);
  gap: 20px;
}

.panel {
  padding: 24px;
}

.search-panel,
.ranking-panel {
  grid-column: 1;
}

.summary-panel {
  grid-column: 2;
  grid-row: 1 / span 2;
}

.field-label,
.panel-heading h2 {
  margin: 0 0 12px;
  font-size: 18px;
}

.search-row {
  display: flex;
  gap: 12px;
}

input,
button {
  font: inherit;
}

input {
  width: 100%;
  padding: 14px 16px;
  color: var(--text);
  background: #fffdfa;
  border: 1px solid rgba(125, 91, 47, 0.18);
  border-radius: 16px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input:focus {
  border-color: rgba(157, 77, 44, 0.48);
  box-shadow: 0 0 0 4px rgba(157, 77, 44, 0.1);
}

button {
  flex: 0 0 92px;
  border: 0;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #fff;
  cursor: pointer;
}

.helper-text,
.feedback,
.panel-heading p,
.person-meta,
.group-meta,
.empty-state p {
  color: var(--muted);
}

.feedback {
  min-height: 24px;
  margin-top: 12px;
  font-size: 14px;
}

.empty-state {
  display: grid;
  place-items: center;
  min-height: 560px;
  text-align: center;
}

.empty-state h2 {
  margin: 0 0 8px;
  font-size: 26px;
}

.hidden {
  display: none;
}

.summary-top {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
}

.person-name {
  margin: 0;
  font-size: 32px;
  font-weight: 700;
}

.person-meta {
  margin: 8px 0 0;
  line-height: 1.7;
}

.group-meta {
  margin: 8px 0 0;
  font-size: 14px;
  color: var(--accent-strong);
}

.badge-group {
  display: flex;
  gap: 12px;
}

.metric-badge,
.overview-card,
.category-card {
  border-radius: 18px;
  border: 1px solid var(--line);
  background: var(--bg-soft);
}

.metric-badge {
  min-width: 130px;
  padding: 16px;
  text-align: center;
}

.metric-badge span,
.overview-card span,
.submetric span {
  display: block;
  color: var(--muted);
  font-size: 13px;
}

.metric-badge strong,
.overview-card strong,
.category-title strong {
  display: block;
  margin-top: 6px;
  font-size: 28px;
  color: var(--accent-strong);
}

.overview-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.overview-card {
  padding: 18px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  margin-top: 18px;
}

.category-card {
  padding: 18px;
}

.category-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
}

.category-title {
  margin: 0;
}

.category-title p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.target-pill {
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  color: var(--success);
  background: rgba(36, 93, 75, 0.1);
}

.submetric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.submetric {
  padding: 14px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid rgba(125, 91, 47, 0.1);
}

.submetric strong {
  display: block;
  margin-top: 8px;
  font-size: 22px;
}

.submetric em {
  display: block;
  margin-top: 4px;
  font-style: normal;
  font-size: 13px;
  color: var(--muted);
}

.table-wrap {
  overflow: auto;
}

.group-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 14px 0 16px;
}

.group-tab {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid rgba(125, 91, 47, 0.16);
  background: #fffaf2;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s ease;
}

.group-tab.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  border-color: transparent;
  color: #fff;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 12px 10px;
  border-bottom: 1px solid rgba(125, 91, 47, 0.12);
  text-align: left;
  white-space: nowrap;
}

thead th {
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}

tbody tr.highlight {
  background: rgba(241, 215, 188, 0.45);
}

tbody tr:hover {
  background: rgba(157, 77, 44, 0.05);
}

@media (max-width: 1080px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .summary-panel,
  .search-panel,
  .ranking-panel {
    grid-column: auto;
    grid-row: auto;
  }

  .overview-grid,
  .category-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 720px) {
  .page-shell {
    width: min(100vw - 20px, 1200px);
    padding-top: 18px;
  }

  .hero,
  .summary-top,
  .badge-group,
  .search-row {
    flex-direction: column;
  }

  button {
    width: 100%;
    min-height: 48px;
  }

  .overview-grid,
  .category-grid,
  .submetric-grid {
    grid-template-columns: 1fr;
  }

  .empty-state {
    min-height: 340px;
  }
}

</style>

  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">离线可用</p>
          <h1>绩效测算器及实时排名</h1>
          <p class="hero-text">
            输入姓名后，自动读取责任田与重点产品测算结果，展示五大重点品累计/当月达成和综合排名。
          </p>
        </div>
        <div class="hero-meta" id="heroMeta"></div>
      </header>

      <main class="layout">
        <section class="panel search-panel">
          <label class="field-label" for="nameInput">姓名查询</label>
          <div class="search-row">
            <input
              id="nameInput"
              name="name"
              type="text"
              list="nameOptions"
              placeholder="请输入姓名，例如：李华超A"
              autocomplete="off"
            />
            <button id="searchButton" type="button">查询</button>
          </div>
          <datalist id="nameOptions"></datalist>
          <p class="helper-text">
            支持下拉选择和模糊输入，页面完全本地运行，不需要联网。
          </p>
          <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
        </section>

        <section class="panel summary-panel" id="summaryPanel">
          <div class="empty-state" id="emptyState">
            <h2>等待查询</h2>
            <p>输入姓名后，这里会显示个人综合表现、排名和五类重点品达成结果。</p>
          </div>

          <div class="summary-content hidden" id="summaryContent">
            <div class="summary-top">
              <div>
                <p class="person-name" id="personName"></p>
                <p class="person-meta" id="personMeta"></p>
                <p class="group-meta" id="groupMeta"></p>
              </div>
              <div class="badge-group">
                <div class="metric-badge">
                  <span>组内排名</span>
                  <strong id="personRank">-</strong>
                </div>
                <div class="metric-badge">
                  <span>综合得分</span>
                  <strong id="personScore">-</strong>
                </div>
              </div>
            </div>

            <div class="overview-grid">
              <article class="overview-card">
                <span>累计达成得分</span>
                <strong id="cumulativeScore">-</strong>
              </article>
              <article class="overview-card">
                <span>当月达成得分</span>
                <strong id="monthlyScore">-</strong>
              </article>
              <article class="overview-card">
                <span>总目标累计达成</span>
                <strong id="overallCumulativeRate">-</strong>
              </article>
              <article class="overview-card">
                <span>总目标当月达成</span>
                <strong id="overallMonthlyRate">-</strong>
              </article>
            </div>

            <div class="category-grid" id="categoryGrid"></div>
          </div>
        </section>

        <section class="panel ranking-panel">
          <div class="panel-heading">
            <h2>实时排名</h2>
            <p>按 4 个口径分别排名，当前查询人会自动切换到对应分组并高亮。</p>
          </div>
          <div class="group-tabs" id="groupTabs"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>姓名</th>
                  <th>部门</th>
                  <th>岗位</th>
                  <th>年目标</th>
                  <th>综合得分</th>
                </tr>
              </thead>
              <tbody id="rankingTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

<script>
const appData = window.PERFORMANCE_APP_DATA || { meta: {}, people: [] };

const heroMeta = document.querySelector("#heroMeta");
const nameInput = document.querySelector("#nameInput");
const nameOptions = document.querySelector("#nameOptions");
const searchButton = document.querySelector("#searchButton");
const feedback = document.querySelector("#feedback");
const emptyState = document.querySelector("#emptyState");
const summaryContent = document.querySelector("#summaryContent");
const categoryGrid = document.querySelector("#categoryGrid");
const rankingTable = document.querySelector("#rankingTable");
const groupTabs = document.querySelector("#groupTabs");

const personName = document.querySelector("#personName");
const personMeta = document.querySelector("#personMeta");
const groupMeta = document.querySelector("#groupMeta");
const personRank = document.querySelector("#personRank");
const personScore = document.querySelector("#personScore");
const cumulativeScore = document.querySelector("#cumulativeScore");
const monthlyScore = document.querySelector("#monthlyScore");
const overallCumulativeRate = document.querySelector("#overallCumulativeRate");
const overallMonthlyRate = document.querySelector("#overallMonthlyRate");

const CATEGORY_ORDER = [
  "restaurant",
  "organicSalt",
  "zeroSeries",
  "squeezeOyster",
  "coldMix",
];

const people = [...appData.people];
const peopleByName = new Map(people.map((person) => [person.name, person]));
const rankingGroups = appData.rankingGroups || {};
const groupOrder = ["regional", "team", "districtHigh", "districtLow"].filter(
  (key) => rankingGroups[key]
);
let activeGroupKey = groupOrder[0] || "";

function formatPercent(value) {
  if (value === null || value === undefined) return "--";
  return `${(value * 100).toFixed(2)}%`;
}

function formatNumber(value, digits = 2) {
  if (value === null || value === undefined) return "--";
  return Number(value).toLocaleString("zh-CN", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
  });
}

function formatPlainNumber(value, digits = 2) {
  if (value === null || value === undefined) return "--";
  return Number(value).toLocaleString("zh-CN", {
    minimumFractionDigits: 0,
    maximumFractionDigits: digits,
  });
}

function setHeroMeta() {
  const period = appData.meta.period || "最新";
  const peopleCount = appData.meta.peopleCount || people.length;
  heroMeta.innerHTML = `
    <p>统计周期</p>
    <strong>${period}</strong>
    <p>已纳入人员</p>
    <strong>${peopleCount} 人</strong>
  `;
}

function setOptions() {
  nameOptions.innerHTML = people
    .map((person) => `<option value="${person.name}"></option>`)
    .join("");
}

function renderGroupTabs(selectedGroupKey = activeGroupKey) {
  groupTabs.innerHTML = groupOrder
    .map(
      (groupKey) => `
        <button
          type="button"
          class="group-tab ${groupKey === selectedGroupKey ? "active" : ""}"
          data-group="${groupKey}"
        >
          ${rankingGroups[groupKey].label}
        </button>
      `
    )
    .join("");

  groupTabs.querySelectorAll(".group-tab").forEach((button) => {
    button.addEventListener("click", () => {
      activeGroupKey = button.dataset.group || "";
      renderGroupTabs(activeGroupKey);
      renderRanking("", activeGroupKey);
    });
  });
}

function renderRanking(selectedName = "", groupKey = activeGroupKey) {
  const currentGroup = rankingGroups[groupKey];
  const list = currentGroup ? currentGroup.people : [];

  rankingTable.innerHTML = list
    .map(
      (person) => `
        <tr class="${selectedName === person.name ? "highlight" : ""}">
          <td>${person.groupRank ?? "--"}</td>
          <td>${person.name}</td>
          <td>${person.department}</td>
          <td>${person.role}</td>
          <td>${formatPlainNumber(person.overallTarget, 0)}</td>
          <td>${formatPlainNumber(person.overallScore)}</td>
        </tr>
      `
    )
    .join("");
}

function renderCategories(person) {
  categoryGrid.innerHTML = CATEGORY_ORDER.map((key) => {
    const category = person.categories[key];
    return `
      <article class="category-card">
        <div class="category-head">
          <div class="category-title">
            <p>${category.label}</p>
            <strong>${formatPercent(category.cumulativeRate)}</strong>
          </div>
          <span class="target-pill">年目标 ${formatNumber(category.target)}</span>
        </div>
        <div class="submetric-grid">
          <div class="submetric">
            <span>累计达成</span>
            <strong>${formatPercent(category.cumulativeRate)}</strong>
            <em>累计销值 ${formatNumber(category.cumulativeValue)} 万元</em>
          </div>
          <div class="submetric">
            <span>当月达成</span>
            <strong>${formatPercent(category.monthlyRate)}</strong>
            <em>当月销值 ${formatNumber(category.monthlyValue)} 万元</em>
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function renderPerson(person) {
  emptyState.classList.add("hidden");
  summaryContent.classList.remove("hidden");

  personName.textContent = person.name;
  personMeta.textContent = [
    person.department,
    person.role,
    person.targetBasis ? `目标依据：${person.targetBasis}` : "",
  ]
    .filter(Boolean)
    .join("｜");
  groupMeta.textContent = person.rankingGroupLabel
    ? `所在排名组：${person.rankingGroupLabel}｜组内第 ${person.groupRank} / ${person.groupSize} 名`
    : "当前人员未纳入四个分组排名口径。";

  personRank.textContent =
    person.groupRank && person.groupSize
      ? `第 ${person.groupRank} 名`
      : "--";
  personScore.textContent = formatPlainNumber(person.overallScore);
  cumulativeScore.textContent = formatPlainNumber(person.cumulativeScore);
  monthlyScore.textContent = formatPlainNumber(person.monthlyScore);
  overallCumulativeRate.textContent = formatPercent(person.overallCumulativeRate);
  overallMonthlyRate.textContent = formatPercent(person.overallMonthlyRate);

  renderCategories(person);
  if (person.rankingGroup) {
    activeGroupKey = person.rankingGroup;
  }
  renderGroupTabs(activeGroupKey);
  renderRanking(person.name, activeGroupKey);
}

function normalizeKeyword(keyword) {
  return keyword.trim().replace(/\s+/g, "");
}

function searchPerson() {
  const keyword = normalizeKeyword(nameInput.value);
  if (!keyword) {
    feedback.textContent = "请输入姓名后再查询。";
    renderGroupTabs(activeGroupKey);
    renderRanking("", activeGroupKey);
    return;
  }

  const exact = peopleByName.get(keyword);
  if (exact) {
    feedback.textContent = `已匹配到 ${exact.name}。`;
    renderPerson(exact);
    return;
  }

  const matched = people.filter((person) => person.name.includes(keyword));
  if (matched.length === 1) {
    nameInput.value = matched[0].name;
    feedback.textContent = `已自动匹配到 ${matched[0].name}。`;
    renderPerson(matched[0]);
    return;
  }

  if (matched.length > 1) {
    feedback.textContent = `匹配到 ${matched.length} 位，请输入更完整的姓名：${matched
      .map((item) => item.name)
      .join("、")}`;
    renderGroupTabs(activeGroupKey);
    renderRanking("", activeGroupKey);
    return;
  }

  feedback.textContent = "未找到对应姓名，请检查输入是否与表格一致。";
  renderGroupTabs(activeGroupKey);
  renderRanking("", activeGroupKey);
}

searchButton.addEventListener("click", searchPerson);
nameInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    searchPerson();
  }
});
